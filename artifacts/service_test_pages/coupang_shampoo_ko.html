<script type="text/javascript">
function getCookie(name) {
	var i, x, y, ARRcookies = document.cookie.split(";");
	for (i = 0; i < ARRcookies.length; i++) {
		x = ARRcookies[i].substr(0, ARRcookies[i].indexOf("="));
		y = ARRcookies[i].substr(ARRcookies[i].indexOf("=") + 1);
		x = x.replace(/^\s+|\s+$/g, "");
		if (x == name) {
			return unescape(y);
		}
	}
}

document.addEventListener("DOMContentLoaded", function(){
	var AK_COOKIE_REF = getCookie("AK_COOKIE_REF");
	var AK_COOKIE_UIP = getCookie("AK_COOKIE_UIP");
	var AK_COOKIE_REQ = getCookie("AK_COOKIE_REQ");
	const nowdate = new Date();
	var AK_KST = nowdate.toLocaleDateString() + " " + nowdate.toTimeString() ;

	if (AK_COOKIE_REF != undefined && AK_COOKIE_REF != "") {
		document.getElementById("AK_REF").innerHTML = " Reference : " + AK_COOKIE_REF;
	} else {
		document.getElementById("AK_REF").innerHTML = " Reference : No Cookie";
	}

	if (AK_COOKIE_UIP != undefined && AK_COOKIE_UIP != "") {
		document.getElementById("AK_UIP").innerHTML = " Client IP : " + AK_COOKIE_UIP;
	} else {
		document.getElementById("AK_UIP").innerHTML = " Client IP : No Cookie";
	}

	if (AK_COOKIE_REQ != undefined && AK_COOKIE_REQ != "") {
		AK_COOKIE_REQ = AK_COOKIE_REQ.replace(/[@$%^*()<>₩`\\"';]/g, ""); 
		document.getElementById("AK_REQ").innerHTML = " Path : " + AK_COOKIE_REQ;
	} else {
		document.getElementById("AK_REQ").innerHTML = " Path : No Cookie";
		
		AK_COOKIE_REQ = decodeURIComponent(location.href);
		AK_COOKIE_REQ = AK_COOKIE_REQ.replace(/[@$%^*()<>₩`\\"';]/g, ""); 
		document.getElementById("AK_REQ").innerHTML = " Path : " + AK_COOKIE_REQ;
	}

	if (AK_KST != undefined && AK_KST != "") {
		document.getElementById("AK_KST").innerHTML = " Time : " + AK_KST;
	}

	var AK_AGENT = navigator.userAgent;
	if (AK_AGENT != undefined && AK_AGENT != "") {
	    AK_AGENT = AK_AGENT.replace(/[@$%^*()<>₩`\\"';]/g, ""); 
		document.getElementById("AK_AGENT").innerHTML = " UserAgent : " + AK_AGENT;
	}

    if (location.href.toString().indexOf("wing.coupang.com") != -1) {
	} else {
		if (location.href.toString().indexOf(".coupang.com") != -1) {
		    var MS = "<a href=mailto:help@coupang.com>help@coupang.com</a></span>";
			document.getElementById("M1").innerHTML = MS;
			document.getElementById("M2").innerHTML = MS;
		}
	}
});
</script>
